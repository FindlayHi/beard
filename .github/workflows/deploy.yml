name: Deploy site

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build 11ty site
        run: |
          npm install
          npx @11ty/eleventy

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.NODE5_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to node5
        run: |
          scp -r _site/* fin@${{ secrets.NODE5_IP }}:/home/fin/site/_site/
